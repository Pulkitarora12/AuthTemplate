spring:
  application:
    name: notes
  security:
    user:
      name: user1
      password: password1
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  server:
    port: 8080

logging:
  level:
    # Spring Security
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: DEBUG
    org.springframework.web: DEBUG

    # MySQL / JPA Logging
    org.hibernate.SQL: DEBUG                        # logs all SQL queries
    org.hibernate.orm.jdbc.bind: TRACE              # logs bound query parameters
    com.zaxxer.hikari: DEBUG                        # logs connection pool activity
    org.springframework.jdbc.core: DEBUG            # logs JDBC operations
